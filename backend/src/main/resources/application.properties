# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# HikariCP connection pool for testing
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.validation-timeout=5000

# JPA, Flyway
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.access-token-expiration=86400000
application.security.jwt.refreshtoken-expiration=604800000

# Server
server.port=${SERVER_PORT:8080}

# CORS 
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Docker Compose,-deaktivert siden starter containere manuelt for testing 
spring.docker.compose.enabled=false


dotenv.path=../.env
