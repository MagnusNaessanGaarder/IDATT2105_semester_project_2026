spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]

  # Database
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/internal_control}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway
  flyway:
    enabled: true
    validate-on-migrate: false

  # Compose
  docker:
    compose:
      enabled: false

  # Email
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

  # File Upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Azure Storage
  cloud:
    azure:
      storage:
        blob:
          account-name: ikdev
          account-key: ${AZURE_STORAGE_ACCOUNT_KEY}
          endpoint: https://ikdev.blob.core.windows.net

# JWT
application:
  mail:
    from: ${APPLICATION_MAIL_FROM:no-reply@internal-control.local}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000

# API Versioning
api:
  version: v1
  path:
    prefix: /api/${api.version}

# Server
server:
  port: ${SERVER_PORT:8080}

# Logging
logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    com.example.InternalControl: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# SpringDoc/OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  show-actuator: false
