spring:
  cloud:
    azure:
      storage:
        blob:
          account-name: ikdev
          account-key: ${AZURE_STORAGE_ACCOUNT_KEY}
          endpoint: https://ikdev.blob.core.windows.net

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/internal_control}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true

  docker:
    compose:
      file: ../compose-dev.yaml

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: INFO
    com:
      example:
        InternalControl: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
