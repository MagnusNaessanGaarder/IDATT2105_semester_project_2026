# Test configuration with H2 in-memory database 
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT Configuration
# JWT Secret for tests - must be Base64 encoded, at least 256 bits for HS256
# Generate new: openssl rand -base64 32
application.security.jwt.secret-key=bR9kJaTA9mLktgMk69A4lhyNbZ9pBvtbuuOKcr4U1Ko=
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.org.springframework.security=DEBUG
