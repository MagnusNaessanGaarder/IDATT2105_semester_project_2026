spring.datasource.url=jdbc:tc:mysql:8.0:///testdb
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

spring.flyway.enabled=true

spring.main.allow-bean-definition-overriding=true

# Test configuration uses existing project test DB strategy (Testcontainers/external DB)

# JWT Configuration
# JWT Secret for tests - must be Base64 encoded, at least 256 bits for HS256
