# Application.properties file used for testing
# Test configuration
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/internal_control_test
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.main.allow-bean-definition-overriding=true

# JWT Configuration
application.security.jwt.secret-key=test-secret-key-that-is-long-enough-for-hs256-algorithm-at-least-256-bits
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173
