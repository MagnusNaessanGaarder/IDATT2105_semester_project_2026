# Test configuration
# Tests extending AbstractIntegrationTest use TestContainers MySQL
# Other tests fall back to H2

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.main.allow-bean-definition-overriding=true

application.security.jwt.secret-key=bR9kJaTA9mLktgMk69A4lhyNbZ9pBvtbuuOKcr4U1Ko=
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

app.cors.allowed-origins=http://localhost:5173

# Azure Storage disabled for tests
azure.storage.connection-string=
