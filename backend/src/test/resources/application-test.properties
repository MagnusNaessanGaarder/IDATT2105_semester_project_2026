# Application.properties file used for testing
# Uses H2 in-memory database for fast, isolated tests

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Allow bean overriding for test configuration
spring.main.allow-bean-definition-overriding=true

# JWT Configuration
# JWT Secret for tests - must be Base64 encoded, at least 256 bits for HS256
application.security.jwt.secret-key=bR9kJaTA9mLktgMk69A4lhyNbZ9pBvtbuuOKcr4U1Ko=
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173