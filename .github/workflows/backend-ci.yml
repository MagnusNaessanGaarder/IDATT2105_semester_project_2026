name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: internal_control_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: wait for mysql
      run: |
        for i in {1..30}; do
          mysqladmin ping -h localhost -P 3306 -u test_user -ptest_pass && break
          echo "waiting for mysql"
          sleep 2
        done
    
    - name: build and test
      working-directory: ./backend
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/internal_control_test
        SPRING_DATASOURCE_USERNAME: test_user
        SPRING_DATASOURCE_PASSWORD: test_pass
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key-for-ci-that-is-long-enough-for-hs256-algorithm-32bytes' }}
      run: |
        ./mvnw clean test -B -Dcheckstyle.skip=true -Dtest="!*IntegrationTest,!InternalControlApplicationTests"
    
