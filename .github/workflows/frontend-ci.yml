name: frontend ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "frondend/**"
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

