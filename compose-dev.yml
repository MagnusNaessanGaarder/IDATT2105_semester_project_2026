services:
  mysql:
    image: mysql:8.4
    container_name: ik-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Comment out network_mode if not on vpn (for dev)
    # network_mode: host
    # Standard config ( without VPN):
    # ports:
    #   - "3306:3306"
    # volumes:
    #   - mysql-dev-data:/var/lib/mysql
    #   - ./mysql-vpn.cnf:/etc/mysql/conf.d/vpn.cnf:ro

    # VPN config (uncomment these 3 lines if you're on VPN):
    network_mode: host
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./mysql-vpn.cnf:/etc/mysql/conf.d/vpn.cnf:ro

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ik-backend-dev
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_FLYWAY_ENABLED: "true"
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-dev-data:
